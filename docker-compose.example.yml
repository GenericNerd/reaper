version: '3.7'
services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: reaper
    restart: unless-stopped
    links:
      - mongo
    depends_on:
      - mongo
    environment:
      - DISCORD_TOKEN=
      - MONGO_URI=mongodb://<username>:<password>@mongo:27017

  mongo:
    image: mongo
    restart: unless-stopped
    volumes:
      - mongodata:/data/db
    ports:
      - 27017:27017
    environment:
      - MONGO_INITDB_ROOT_USERNAME=<username>
      - MONGO_INITDB_ROOT_PASSWORD=<password>

networks:
  default:
    name: reaper-network
    
volumes:
  mongodata: