version: '3.7'
services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: reaper
    restart: unless-stopped
    links:
      - mongo
      - redis
    depends_on:
      - mongo
      - redis
    environment:
      - DISCORD_TOKEN=
      - MONGO_URI=mongodb://<username>:<password>@mongo:27017
      - REDIS_URI=redis://redis:6379/

  mongo:
    image: mongo
    restart: unless-stopped
    volumes:
      - mongodata:/data/db
    ports:
      - 27017:27017
    environment:
      - MONGO_INITDB_ROOT_USERNAME=<username>
      - MONGO_INITDB_ROOT_PASSWORD=<password>

  redis:
    image: redis
    restart: unless-stopped
    volumes:
      - redisdata:/data/db
    ports:
      - 6379:6379

networks:
  default:
    name: reaper-network
    
volumes:
  mongodata:
  redisdata: